on:
  push:
    branches:
      - main

jobs:
  perform-auth-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_CREDENTIALS }}"
      - name: Install Firebase CLI
        run: |
          npm i -g firebase-tools@13.21.0
      # - name: Install dependencies
      #   run: |
      #     cd nextjs-app/
      #     npm i
      - name: Run auth:export
        run: |
          node --version
          firebase --version
          firebase auth:export auth.csv --project ${{ secrets.PROJECT_ID }} --debug

on:
  push:
    branches:
      - main

jobs:
  perform-auth-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_CREDENTIALS }}"
      - name: Install dependencies
        run: |
          npm i
      - name: Modify MAX_BATCH_SIZE in auth-export.js
        run: |
          sed -i 's/MAX_BATCH_SIZE = 1000/MAX_BATCH_SIZE = 1/g' node_modules/firebase-tools/lib/commands/auth-export.js
        shell: bash
      - name: Run auth:export
        run: |
          node --version
          npm run auth:export -- --project ${{ secrets.PROJECT_ID }}
